{% extends 'base.html' %}

{% block title %}Classes{% endblock %}

{% block content %}
<h2>Classes</h2>
<a href="{% url 'class_add' %}" class="btn btn-success mb-3">Add Class</a>
<table class="table table-striped">
    <thead>
        <tr>
            <th>Name</th>
            <th>Section</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for class in classes %}
        <tr>
            <td>{{ class.name }}</td>
            <td>{{ class.section }}</td>
            <td>
                <a href="{% url 'class_edit' class.pk %}" class="btn btn-sm btn-primary">Edit</a>
                <a href="{% url 'class_delete' class.pk %}" class="btn btn-sm btn-danger">Delete</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="3">No classes found.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
