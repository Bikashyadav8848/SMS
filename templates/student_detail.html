{% extends 'base.html' %}

{% block title %}Student Detail{% endblock %}

{% block content %}
<style>
    .detail-card { background: white; border-radius: 1rem; overflow: hidden; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08); max-width: 600px; margin: 0 auto; }
    .detail-header { background: linear-gradient(90deg, var(--primary) 0%, var(--primary-dark) 100%); color: white; padding: 2rem; }
    .detail-header h1 { color: white; margin: 0; font-size: 2rem; }
    .detail-body { padding: 2rem; }
    .detail-row { display: flex; padding: 1rem 0; border-bottom: 1px solid #e5e7eb; }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { font-weight: 600; color: var(--primary); min-width: 150px; }
    .detail-value { color: #1f2937; }
    .detail-buttons { display: flex; gap: 1rem; margin-top: 2rem; flex-wrap: wrap; }
    .detail-buttons .btn { flex: 1; min-width: 150px; }
</style>

<div class="detail-card">
    <div class="detail-header">
        <h1><i class="fas fa-user-circle"></i> {{ object.roll_number }} - {{ object.name }}</h1>
    </div>
    
    <div class="detail-body">
        <div class="detail-row">
            <div class="detail-label"><i class="fas fa-envelope"></i> Email:</div>
            <div class="detail-value">{{ object.email }}</div>
        </div>
        
        <div class="detail-row">
            <div class="detail-label"><i class="fas fa-id-card"></i> Roll Number:</div>
            <div class="detail-value">{{ object.roll_number }}</div>
        </div>
        
        <div class="detail-buttons">
            <a href="{% url 'student_edit' object.pk %}" class="btn btn-primary">
                <i class="fas fa-edit"></i> Edit
            </a>
            <a href="{% url 'student_delete' object.pk %}" class="btn btn-danger">
                <i class="fas fa-trash"></i> Delete
            </a>
            <a href="{% url 'students' %}" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> Back to List
            </a>
        </div>
    </div>
</div>
{% endblock %}
