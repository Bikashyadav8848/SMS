{% extends 'base.html' %}

{% block title %}Teachers{% endblock %}

{% block content %}
<h2>Teachers</h2>
<a href="{% url 'teacher_add' %}" class="btn btn-success mb-3">Add Teacher</a>
<table class="table table-striped">
    <thead>
        <tr>
            <th>Name</th>
            <th>Subject</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for teacher in teachers %}
        <tr>
            <td>{{ teacher.name }}</td>
            <td>{{ teacher.subject }}</td>
            <td>
                <a href="{% url 'teacher_edit' teacher.pk %}" class="btn btn-sm btn-primary">Edit</a>
                <a href="{% url 'teacher_delete' teacher.pk %}" class="btn btn-sm btn-danger">Delete</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="3">No teachers found.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
