{% extends 'base.html' %}

{% block title %}{% if object %}Edit Teacher{% else %}Add Teacher{% endif %}{% endblock %}

{% block content %}
<h2>{% if object %}Edit Teacher{% else %}Add Teacher{% endif %}</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Save</button>
    <a href="{% url 'teachers' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
