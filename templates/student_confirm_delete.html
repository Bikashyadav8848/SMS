{% extends 'base.html' %}

{% block title %}Delete Student{% endblock %}

{% block content %}
<style>
    .delete-card { background: white; padding: 2rem; border-radius: 1rem; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08); max-width: 500px; margin: 0 auto; border-left: 4px solid #ef4444; }
    .delete-icon { font-size: 3rem; color: #ef4444; text-align: center; margin-bottom: 1.5rem; }
    .delete-title { color: #7f1d1d; font-size: 1.25rem; margin-bottom: 1rem; }
    .delete-name { font-weight: 700; color: #1f2937; }
    .delete-message { color: #6b7280; margin-bottom: 2rem; line-height: 1.6; }
    .delete-buttons { display: flex; gap: 1rem; margin-top: 2rem; }
    .delete-buttons form { flex: 1; }
    .delete-buttons form button { width: 100%; }
    .delete-buttons a { flex: 1; }
</style>

<div class="delete-card">
    <div class="delete-icon">
        <i class="fas fa-exclamation-triangle"></i>
    </div>
    
    <h2 style="text-align: center; padding-left: 0; margin-bottom: 1rem; color: #7f1d1d;">Delete Student</h2>
    
    <div class="delete-message">
        <p>Are you sure you want to delete the following student?</p>
        <p class="delete-name"><i class="fas fa-user"></i> {{ object.name }}</p>
        <p style="font-size: 0.875rem; color: #9ca3af; margin-top: 0.5rem;">This action cannot be undone.</p>
    </div>

    <div class="delete-buttons">
        <form method="post" style="margin: 0;">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">
                <i class="fas fa-trash"></i> Yes, Delete Permanently
            </button>
        </form>
        <a href="{% url 'students' %}" class="btn btn-secondary">
            <i class="fas fa-times"></i> Cancel
        </a>
    </div>
</div>
{% endblock %}
